<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WGS Rapport Converter</title>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.27.0/full/pyodide.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>
  <style>
    body { font-family: sans-serif; max-width: 860px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 1.4rem; }
    #status { color: #555; font-style: italic; margin: 10px 0; }
    #error  { color: red; white-space: pre-wrap; margin: 10px 0; }
    textarea { width: 100%; height: 340px; font-family: monospace; font-size: 0.85rem; }
    button { margin-top: 10px; padding: 8px 16px; cursor: pointer; margin-right: 8px; }
    .hidden { display: none; }
    label { font-weight: bold; }
    .btn-word { background: #2b579a; color: #fff; border: none; border-radius: 4px; }
    .btn-word:hover { background: #1e3f72; }
  </style>
</head>
<body>
  <h1>Hartwig WGS JSON → txt/docx</h1>
  <p id="status">Loading Pyodide...</p>
  <p id="error"></p>

  <div id="ui" class="hidden">
    <label for="fileInput">Upload JSON bestand:</label><br/><br/>
    <input type="file" id="fileInput" accept=".json" />
    <br/><br/>
    <button id="convertBtn" disabled>Converteer</button>
    <br/><br/>
    <div id="outputSection" class="hidden">
      <label>Voorbeeld:</label><br/>
      <textarea id="outputPreview" readonly></textarea>
      <br/>
      <button id="downloadBtn">⬇ Export: txt</button>
      <button id="wordBtn" class="btn-word">📄 Export: Word</button>
    </div>
  </div>

  <script type="text/javascript">
    // ── Jinja2 template ────────────────────────────────────────────────────────
    const TEMPLATE = `\
Aanvulling ({{ today }}): Uitslag whole genome sequencing (WGS) uitgevoerd door Hartwig Medical Foundation op corresponderend vriesmateriaal (tumor purity {{ "%.0f"|format(report.genomic_analysis.tumor_purity * 100)}}%) onder HMF sample ID {{ report.reporting_id }}. Onderstaand een samenvatting, het volledige rapport is beschikbaar onder multimedia in HIX.
Tumor specifieke varianten met high driver likelihood:
{% if report.genomic_analysis.tumor_observed_variants %}
{% for v in report.genomic_analysis.tumor_observed_variants %}
    - {{ v.curated_gene }} {{ v.hgvs_coding_impact }}; {{ v.hgvs_protein_impact }} (tVAF {{ v.t_vaf }}; {% if v.biallelic %}bi-allelische inactivatie{% else %}geen bi-allelische inactivatie{% endif %})
{% endfor %}
{% else %}
geen
{% endif %}

Tumor specifieke gains & losses:
{% if report.genomic_analysis.tumor_observed_gains_and_losses %}
{% for g in report.genomic_analysis.tumor_observed_gains_and_losses %}
    - {{ g.curated_gene }}, {{ g.type }} ({{ g.min_copies }} copies)
{% endfor %}
{% else %}
geen
{% endif %}

Tumor specifieke fusies: {% if report.genomic_analysis.tumor_observed_gene_fusions %}{% for f in report.genomic_analysis.tumor_observed_gene_fusions %}{{ f }}{% if not loop.last %}, {% endif %}{% endfor %}{% else %}geen{% endif %}

Moleculaire predictie weefsel van origine: {{ report.molecular_tissue_of_origin_prediction.cancer_type }} (likelihood {{ "%.0f"|format(report.molecular_tissue_of_origin_prediction.prediction_percentage * 100) }}%)
MSI status: {{ report.genomic_analysis.microsatellite_status_str }} ({{ report.genomic_analysis.microsatellite_status }})
Tumor mutational burden (TMB): {{ report.genomic_analysis.tumor_mutational_burden }} varianten per Mb
Tumor mutational load (TML): {{ report.genomic_analysis.tumor_mutational_load }}
HR-deficiency score (schaal 0-1): {{ report.genomic_analysis.hrd_value }} ({{ report.genomic_analysis.hrd_status }})
Tumorspecifieke virale inserties: {% if report.genomic_analysis.tumor_observed_viral_insertions %}{% for vi in report.genomic_analysis.tumor_observed_viral_insertions %}{{ vi }}{% if not loop.last %}, {% endif %}{% endfor %}{% else %}geen{% endif %}


Conclusie
Aanvulling ({{ today }}): Verslag is aangevuld met uitslag whole genome sequencing (WGS) uitgevoerd door Hartwig Medical Foundation op corresponderend vriesmateriaal (tumor purity {{ "%.0f"|format(report.genomic_analysis.tumor_purity * 100) if report.genomic_analysis.tumor_purity <= 1 else report.genomic_analysis.tumor_purity }}%) onder HMF sample ID {{ report.reporting_id }}. Zie samenvatting onder bovenstaande rubriek Moleculair onderzoek.
`;

    // ── DOM refs ───────────────────────────────────────────────────────────────
    const status        = document.getElementById("status");
    const error         = document.getElementById("error");
    const ui            = document.getElementById("ui");
    const convertBtn    = document.getElementById("convertBtn");
    const outputSection = document.getElementById("outputSection");
    const outputPreview = document.getElementById("outputPreview");
    const downloadBtn   = document.getElementById("downloadBtn");
    const wordBtn       = document.getElementById("wordBtn");
    const fileInput     = document.getElementById("fileInput");

    let pyodide = null;
    let renderedOutput = "";

    // ── Today's date in DD-MM-YYYY ─────────────────────────────────────────────
    function todayDutch() {
      const d = new Date();
      const dd = String(d.getDate()).padStart(2, '0');
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const yyyy = d.getFullYear();
      return `${dd}-${mm}-${yyyy}`;
    }

    // ── Init Pyodide ───────────────────────────────────────────────────────────
    async function main() {
      try {
        pyodide = await loadPyodide();
        status.textContent = "Packages installeren (pydantic, jinja2)...";
        await pyodide.loadPackage("micropip");
        await pyodide.runPythonAsync(`
import micropip
await micropip.install(["pydantic", "jinja2"])
        `);

        pyodide.globals.set("TEMPLATE_STR", TEMPLATE);

        await pyodide.runPythonAsync(`
import json
import datetime as dt
from pydantic import BaseModel, Field, computed_field, model_validator
from pydantic.alias_generators import to_camel
from jinja2 import BaseLoader, Environment

class ReportModel(BaseModel):
    model_config = {
        "alias_generator": to_camel,
        "populate_by_name": True,
    }

class TumorVariant(ReportModel):
    curated_gene: str
    driver: str
    hgvs_coding_impact: str
    hgvs_protein_impact: str
    t_vaf: str = Field(alias="tVAF")
    biallelic: bool

class GainOrLoss(ReportModel):
    chromosome: str
    region: str
    gene: str
    curated_gene: str
    type: str
    min_copies: str
    max_copies: str
    chromosome_arm_copies: str

class MolecularTissueOfOriginPrediction(ReportModel):
    cancer_type: str
    prediction_percentage: float

class GenomicAnalysis(ReportModel):
    tumor_purity: float
    microsatellite_status: str
    tumor_mutational_burden: str
    tumor_mutational_load: int
    hrd_value: str
    hrd_status: str
    tumor_observed_variants: list[TumorVariant]
    tumor_observed_gains_and_losses: list[GainOrLoss]
    tumor_observed_gene_fusions: list[dict] = Field(default_factory=list)
    tumor_observed_viral_insertions: list[dict] = Field(default_factory=list)

    @computed_field
    @property
    def microsatellite_status_str(self) -> str:
        mapping = {"MSS": "stabiel", "MSI": "instabiel"}
        return mapping.get(self.microsatellite_status.upper(), self.microsatellite_status)

class Report(ReportModel):
    reporting_id: str | None = Field(default="N/A")
    genomic_analysis: GenomicAnalysis
    molecular_tissue_of_origin_prediction: MolecularTissueOfOriginPrediction
    
    @model_validator(mode="before")
    @classmethod
    def extract_reporting_id(cls, data: dict) -> dict:
        if "reporting_id" not in data and "reportingId" not in data:
            patient = data.get("patientData") or data.get("patient_data", {})
            data["reporting_id"] = patient.get("reportingId") or patient.get("reporting_id", "N/A")
        return data

def convert(json_str: str, today: str) -> str:
    data = json.loads(json_str)
    report = Report.model_validate(data)
    env = Environment(loader=BaseLoader(), trim_blocks=True, lstrip_blocks=True)
    template = env.from_string(TEMPLATE_STR)
    return template.render(report=report, today=today)
        `);

        status.textContent = "Status: Ready";
        ui.classList.remove("hidden");
        fileInput.addEventListener("change", () => {
          convertBtn.disabled = fileInput.files.length === 0;
        });

      } catch (e) {
        status.textContent = "Status: Failed loading pyodide";
        error.textContent = e.toString();
      }
    }

    // ── Convert ────────────────────────────────────────────────────────────────
    convertBtn.addEventListener("click", async () => {
      error.textContent = "";
      outputSection.classList.add("hidden");
      const file = fileInput.files[0];
      if (!file) return;

      const jsonStr = await file.text();
      try {
        pyodide.globals.set("_json_input", jsonStr);
        pyodide.globals.set("_today", todayDutch());
        renderedOutput = await pyodide.runPythonAsync(`convert(_json_input, _today)`);
        outputPreview.value = renderedOutput;
        outputSection.classList.remove("hidden");
      } catch (e) {
        error.textContent = "Fout: " + e.toString();
      }
    });

    // ── Download TXT ───────────────────────────────────────────────────────────
    downloadBtn.addEventListener("click", () => {
      const blob = new Blob([renderedOutput], { type: "text/plain" });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href     = url;
      a.download = `WGS_Rapport_${todayDutch().replace(/-/g, '')}.txt`;
      a.click();
      URL.revokeObjectURL(url);
    });

    // ── Export to Word ─────────────────────────────────────────────────────────
    wordBtn.addEventListener("click", async () => {
      if (!renderedOutput) return;
      const { Document, Packer, Paragraph, TextRun } = docx;

      const paragraphs = renderedOutput.split('\n').map(line => {
        if (line.trim() === 'Conclusie') {
          return new Paragraph({
            children: [new TextRun({ text: 'Conclusie', bold: true, size: 24, font: 'Arial' })],
            spacing: { before: 240, after: 120 },
          });
        }
        // Bold label before first colon
        const colonIdx = line.indexOf(':');
        if (colonIdx > -1 && colonIdx < 80) {
          return new Paragraph({
            children: [
              new TextRun({ text: line.substring(0, colonIdx + 1), bold: true, size: 22, font: 'Arial' }),
              new TextRun({ text: line.substring(colonIdx + 1), size: 22, font: 'Arial' }),
            ],
            spacing: { after: 80 },
          });
        }
        return new Paragraph({
          children: [new TextRun({ text: line, size: 22, font: 'Arial' })],
          spacing: { after: 80 },
        });
      });

      const doc = new Document({ sections: [{ children: paragraphs }] });
      const blob = await Packer.toBlob(doc);
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href     = url;
      a.download = `WGS_Rapport_${todayDutch().replace(/-/g, '')}.docx`;
      a.click();
      URL.revokeObjectURL(url);
    });

    main();
  </script>
</body>
</html>
